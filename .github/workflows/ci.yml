name: Continuous integration

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install pinned CI dependencies
        run: python -m pip install --requirement requirements-ci.lock
      - name: Install package
        run: python -m pip install --no-deps --editable .
      - name: Build package
        run: python -m build
      - name: Lint
        run: ruff check
      - name: Type check
        run: mypy src/particleml
      - name: Test
        run: pytest
      - name: Validate software documents
        run: python scripts/validate_software_docs.py

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install documentation dependencies
        run: |
          python -m pip install --requirement requirements-ci.lock
          pnpm install --frozen-lockfile
      - name: Test documentation
        run: pnpm test
      - name: Build documentation
        run: pnpm docs:build
